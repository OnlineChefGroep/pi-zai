# Manual tag-push fallback for @onlinechefgroep/pi-zai.
# Publishes to npmjs.org and mirrors to GitHub Packages.
# Primary path is release.yml. A tag created with GITHUB_TOKEN by release.yml
# does not re-trigger this workflow. Idempotent per registry. npmjs needs
# NPM_TOKEN; GitHub Packages uses GITHUB_TOKEN with packages:write. Jobs are
# independent so a GH Packages failure never blocks npmjs.
name: Publish package registries

on:
  push:
    tags: ['v*']

jobs:
  npmjs:
    if: github.repository == 'OnlineChefGroep/pi-zai'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            worker/telemetry/package-lock.json
      - name: Read package version
        id: package
        run: |
          v=$(node -p "require('./package.json').version")
          printf 'version=%s\n' "$v" >> "$GITHUB_OUTPUT"
      - name: Check npmjs.org
        id: registry
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          if npm view "@onlinechefgroep/pi-zai@$PACKAGE_VERSION" version --json >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.registry.outputs.published != 'true'
        run: npm ci --ignore-scripts
      - if: steps.registry.outputs.published != 'true'
        run: npm ci --ignore-scripts --prefix worker/telemetry
      - if: steps.registry.outputs.published != 'true'
        run: npm run lint
      - if: steps.registry.outputs.published != 'true'
        run: npm run build
      - if: steps.registry.outputs.published != 'true'
        run: npm test
      - if: steps.registry.outputs.published != 'true'
        run: npm run check:consumer-install
      - if: steps.registry.outputs.published != 'true'
        run: node scripts/worker-audit.mjs
      - name: Publish to npmjs.org
        if: steps.registry.outputs.published != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

  github-packages:
    if: github.repository == 'OnlineChefGroep/pi-zai'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            worker/telemetry/package-lock.json
      - name: Check GitHub Packages
        id: ghpkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/ci/github-packages.sh check
      - if: steps.ghpkg.outputs.published != 'true'
        run: npm ci --ignore-scripts
      - if: steps.ghpkg.outputs.published != 'true'
        run: npm ci --ignore-scripts --prefix worker/telemetry
      - if: steps.ghpkg.outputs.published != 'true'
        run: npm run lint
      - if: steps.ghpkg.outputs.published != 'true'
        run: npm run build
      - if: steps.ghpkg.outputs.published != 'true'
        run: npm test
      - if: steps.ghpkg.outputs.published != 'true'
        run: npm run check:consumer-install
      - if: steps.ghpkg.outputs.published != 'true'
        run: node scripts/worker-audit.mjs
      - name: Publish to GitHub Packages
        if: steps.ghpkg.outputs.published != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/ci/github-packages.sh publish
