name: Release

# Primary publish path for @onlinechefgroep/pi-zai.
# Publishes to npmjs.org (public) and mirrors to GitHub Packages
# (https://github.com/OnlineChefGroep/pi-zai/pkgs/npm/pi-zai).
# Triggers when package identity / changelog changes on main, or via manual
# workflow_dispatch (also used to backfill GitHub Packages when npmjs already
# has the version). Idempotent per registry.
on:
  push:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
      - CHANGELOG.md
      - .github/workflows/release.yml
  workflow_dispatch:

concurrency:
  group: npm-release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  publish:
    if: github.repository == 'OnlineChefGroep/pi-zai'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Use npm with trusted-publishing support
        run: npm install --global npm@11.5.1
      - name: Read package identity
        id: package
        run: |
          package_name=$(node -p "require('./package.json').name")
          package_version=$(node -p "require('./package.json').version")
          printf 'name=%s\nversion=%s\n' "$package_name" "$package_version" >> "$GITHUB_OUTPUT"
      - name: Check npmjs.org
        id: npmjs
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version --json >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Check GitHub Packages
        id: ghpkg
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          userconfig="$(mktemp)"
          trap 'rm -f "$userconfig"' EXIT
          {
            printf '%s\n' '@onlinechefgroep:registry=https://npm.pkg.github.com'
            printf '%s\n' "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          } >"$userconfig"

          set +e
          out="$(npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version --userconfig "$userconfig" --json 2>&1)"
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          elif printf '%s\n' "$out" | grep -Eqi 'E404|404 Not Found|code E404'; then
            echo "published=false" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$out" >&2
            exit 1
          fi
      - name: Decide whether to build
        id: gate
        run: |
          if [ "${{ steps.npmjs.outputs.published }}" != "true" ] || [ "${{ steps.ghpkg.outputs.published }}" != "true" ]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.gate.outputs.needed == 'true'
        run: npm ci --ignore-scripts
      - if: steps.gate.outputs.needed == 'true'
        run: npm ci --ignore-scripts --prefix worker/telemetry
      - if: steps.gate.outputs.needed == 'true'
        run: npm run lint
      - if: steps.gate.outputs.needed == 'true'
        run: npm run build
      - if: steps.gate.outputs.needed == 'true'
        run: npm test
      - if: steps.gate.outputs.needed == 'true'
        run: npm run check:package
      - if: steps.gate.outputs.needed == 'true'
        run: npm run check:consumer-install
      - if: steps.gate.outputs.needed == 'true'
        run: npm run check --prefix worker/telemetry
      - name: Publish to npmjs.org
        if: steps.npmjs.outputs.published != 'true'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
            echo "Using configured npm automation token."
          else
            echo "No classic npm token configured; using GitHub OIDC trusted publishing."
          fi

          set +e
          npm publish --access public --provenance 2>&1 | tee npm-publish.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            grep -Ei 'npm error|npm ERR|ENEEDAUTH|E[0-9]{3}|EOTP|OIDC|auth|401|403|404|trusted' npm-publish.log | tail -n 10 > npm-publish-errors.log || true
            if [ ! -s npm-publish-errors.log ]; then
              tail -n 10 npm-publish.log > npm-publish-errors.log
            fi
            while IFS= read -r line; do
              line=${line//'%'/'%25'}
              line=${line//$'\r'/'%0D'}
              line=${line//$'\n'/'%0A'}
              echo "::error title=npm publish::$line"
            done < npm-publish-errors.log
            exit "$status"
          fi
      - name: Publish to GitHub Packages
        if: steps.ghpkg.outputs.published != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # Ephemeral userconfig — do not rewrite the job .npmrc used for npmjs deps.
          # --ignore-scripts: quality gate already ran above (or via npmjs prepublishOnly).
          userconfig="$(mktemp)"
          trap 'rm -f "$userconfig"' EXIT
          {
            printf '%s\n' '@onlinechefgroep:registry=https://npm.pkg.github.com'
            printf '%s\n' "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          } >"$userconfig"

          # Ensure dist exists when npmjs was already published (backfill path).
          if [ ! -f dist/index.js ]; then
            npm run build
          fi

          npm publish --access public --ignore-scripts --userconfig "$userconfig"
      - name: Create GitHub release and tag
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          tag="v$PACKAGE_VERSION"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --target "$GITHUB_SHA" --title "$tag" --generate-notes
          else
            echo "GitHub release $tag already exists; skipping create."
          fi
