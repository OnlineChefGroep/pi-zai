name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz" | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
      - name: Gitleaks (working tree)
        run: gitleaks detect --source . --no-git --verbose --redact
      - name: Pattern guard
        run: bash scripts/check-secrets.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            worker/telemetry/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm ci --ignore-scripts --prefix worker/telemetry
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - run: npm run check:package
      - run: npm run check --prefix worker/telemetry
