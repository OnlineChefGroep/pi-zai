name: Release

# Primary publish path for @onlinechefgroep/pi-zai.
# Publishes to npmjs.org (public) and mirrors to GitHub Packages
# (https://github.com/OnlineChefGroep/pi-zai/pkgs/npm/pi-zai).
# Jobs are independent: a GitHub Packages failure never blocks npmjs or the
# GitHub Release/tag. Triggers on package identity / changelog changes on main,
# or via workflow_dispatch (backfill GH Packages when npmjs already has the
# version). Idempotent per registry.
on:
  push:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
      - CHANGELOG.md
      - .github/workflows/release.yml
      - scripts/ci/github-packages.sh
  workflow_dispatch:

concurrency:
  group: npm-release
  cancel-in-progress: false

jobs:
  npmjs:
    if: github.repository == 'OnlineChefGroep/pi-zai'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Use npm with trusted-publishing support
        run: npm install --global npm@11.5.1
      - name: Read package identity
        id: package
        run: |
          package_name=$(node -p "require('./package.json').name")
          package_version=$(node -p "require('./package.json').version")
          printf 'name=%s\nversion=%s\n' "$package_name" "$package_version" >> "$GITHUB_OUTPUT"
      - name: Check npmjs.org
        id: registry
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version --json >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.registry.outputs.published != 'true'
        run: npm ci --ignore-scripts
      - if: steps.registry.outputs.published != 'true'
        run: npm ci --ignore-scripts --prefix worker/telemetry
      - if: steps.registry.outputs.published != 'true'
        run: npm run lint
      - if: steps.registry.outputs.published != 'true'
        run: npm run build
      - if: steps.registry.outputs.published != 'true'
        run: npm test
      - if: steps.registry.outputs.published != 'true'
        run: npm run check:package
      - if: steps.registry.outputs.published != 'true'
        run: npm run check:consumer-install
      - if: steps.registry.outputs.published != 'true'
        run: npm run check --prefix worker/telemetry
      - name: Publish to npmjs.org
        if: steps.registry.outputs.published != 'true'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
            echo "Using configured npm automation token."
          else
            echo "No classic npm token configured; using GitHub OIDC trusted publishing."
          fi

          set +e
          npm publish --access public --provenance 2>&1 | tee npm-publish.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            grep -Ei 'npm error|npm ERR|ENEEDAUTH|E[0-9]{3}|EOTP|OIDC|auth|401|403|404|trusted' npm-publish.log | tail -n 10 > npm-publish-errors.log || true
            if [ ! -s npm-publish-errors.log ]; then
              tail -n 10 npm-publish.log > npm-publish-errors.log
            fi
            while IFS= read -r line; do
              line=${line//'%'/'%25'}
              line=${line//$'\r'/'%0D'}
              line=${line//$'\n'/'%0A'}
              echo "::error title=npm publish::$line"
            done < npm-publish-errors.log
            exit "$status"
          fi

  github-packages:
    if: github.repository == 'OnlineChefGroep/pi-zai'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Check GitHub Packages
        id: ghpkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/ci/github-packages.sh check
      - if: steps.ghpkg.outputs.published != 'true'
        run: npm ci --ignore-scripts
      - if: steps.ghpkg.outputs.published != 'true'
        run: npm ci --ignore-scripts --prefix worker/telemetry
      - if: steps.ghpkg.outputs.published != 'true'
        run: npm run lint
      - if: steps.ghpkg.outputs.published != 'true'
        run: npm run build
      - if: steps.ghpkg.outputs.published != 'true'
        run: npm test
      - if: steps.ghpkg.outputs.published != 'true'
        run: npm run check:package
      - if: steps.ghpkg.outputs.published != 'true'
        run: npm run check:consumer-install
      - if: steps.ghpkg.outputs.published != 'true'
        run: npm run check --prefix worker/telemetry
      - name: Publish to GitHub Packages
        if: steps.ghpkg.outputs.published != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/ci/github-packages.sh publish

  github-release:
    if: github.repository == 'OnlineChefGroep/pi-zai'
    needs: [npmjs]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Create GitHub release and tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          package_version=$(node -p "require('./package.json').version")
          tag="v$package_version"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --target "$GITHUB_SHA" --title "$tag" --generate-notes
          else
            echo "GitHub release $tag already exists; skipping create."
          fi
