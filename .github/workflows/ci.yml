name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            worker/telemetry/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm ci --ignore-scripts --prefix worker/telemetry
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - run: npm run check --prefix worker/telemetry
      - run: npm audit --audit-level=high --prefix worker/telemetry
