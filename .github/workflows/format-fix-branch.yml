name: Format install fix branch

on:
  push:
    branches: [fix/isolated-extension-install]

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22.x'
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Apply repository formatter
        run: ./node_modules/.bin/biome check --write scripts/check-consumer-install.mjs package.json
      - name: Commit formatter output
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/check-consumer-install.mjs package.json
          git commit -m "style: apply repository formatter"
          git push origin HEAD:fix/isolated-extension-install
