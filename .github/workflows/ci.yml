name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          persist-credentials: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            worker/telemetry/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm ci --ignore-scripts --prefix worker/telemetry
      - name: Apply Biome formatting
        if: github.event_name == 'pull_request' && github.head_ref == 'release/v0.4.0-metrics-hardening'
        run: |
          npm run lint:fix
          if ! git diff --quiet; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add -A
            git commit -m "style: format v0.4.0 hardening"
            git push origin HEAD:${GITHUB_HEAD_REF}
          fi
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - run: npm run check:package
      - run: npm run check --prefix worker/telemetry
