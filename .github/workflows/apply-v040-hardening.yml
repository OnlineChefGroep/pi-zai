name: Apply v0.4.0 hardening

on:
  push:
    branches: [release/v0.4.0-metrics-hardening]
    paths: [.github/workflows/apply-v040-hardening.yml]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: release/v0.4.0-metrics-hardening
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            worker/telemetry/package-lock.json
      - name: Apply source, test, documentation, and release changes
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}: {old[:80]!r}")
              file.write_text(text.replace(old, new, 1))

          def insert_before(path: str, marker: str, addition: str) -> None:
              replace_once(path, marker, addition + marker)

          # SQLite rollups must be additive. Size-limit batches may otherwise
          # overwrite earlier rollups or repeatedly count the same remaining rows.
          replace_once(
              "src/storage/sqlite.ts",
              """ON CONFLICT(day, project_id, provider, model, extension_version) DO UPDATE SET
  turn_count = excluded.turn_count,
  attempt_count = excluded.attempt_count,
  error_count = excluded.error_count,
  input_tokens = excluded.input_tokens,
  cache_read_tokens = excluded.cache_read_tokens,
  cache_write_tokens = excluded.cache_write_tokens,
  output_tokens = excluded.output_tokens,
  estimated_api_cost_microusd = excluded.estimated_api_cost_microusd`;""",
              """ON CONFLICT(day, project_id, provider, model, extension_version) DO UPDATE SET
  turn_count = daily_rollups.turn_count + excluded.turn_count,
  attempt_count = daily_rollups.attempt_count + excluded.attempt_count,
  error_count = daily_rollups.error_count + excluded.error_count,
  input_tokens = daily_rollups.input_tokens + excluded.input_tokens,
  cache_read_tokens = daily_rollups.cache_read_tokens + excluded.cache_read_tokens,
  cache_write_tokens = daily_rollups.cache_write_tokens + excluded.cache_write_tokens,
  output_tokens = daily_rollups.output_tokens + excluded.output_tokens,
  estimated_api_cost_microusd = daily_rollups.estimated_api_cost_microusd + excluded.estimated_api_cost_microusd`;

const ROLLUP_ATTEMPT_BATCH_SQL = ROLLUP_ATTEMPTS_OLDER_THAN_SQL.replace(
  "WHERE occurred_at < ?",
  "WHERE id IN (SELECT id FROM provider_attempts WHERE occurred_at < ? ORDER BY occurred_at ASC LIMIT 500)",
);""",
          )
          replace_once(
              "src/storage/sqlite.ts",
              "this.database.prepare(ROLLUP_ATTEMPTS_OLDER_THAN_SQL).run(preserveSince);",
              "this.database.prepare(ROLLUP_ATTEMPT_BATCH_SQL).run(preserveSince);",
          )

          storage_tests = r'''
	it("adds newly expired attempts to an existing daily rollup", () => {
		const now = Date.parse("2026-07-14T12:00:00.000Z");
		const occurredAt = Date.parse("2026-05-01T08:00:00.000Z");
		const storage = sqliteStorage();
		storage.recordAttempt(record({ occurredAt }));
		storage.runCleanup(now, true);
		storage.recordAttempt(record({ occurredAt: occurredAt + 1_000 }));
		storage.runCleanup(now + 86_400_000, true);

		expect(storage.getUsageSummary({ projectId: "project-a" })).toMatchObject({
			attempts: 2,
			inputTokens: 200,
			cacheReadTokens: 1_800,
		});
		storage.close();
	});

	it("preserves totals across multiple size-limit rollup batches", () => {
		const now = Date.parse("2026-07-14T12:00:00.000Z");
		const storage = sqliteStorage({
			retentionDays: 365,
			maxDatabaseBytes: 1,
		});
		for (let index = 0; index < 1_200; index += 1) {
			storage.recordAttempt(
				record({ occurredAt: now - 10 * 86_400_000 + index }),
			);
		}

		storage.runCleanup(now, true);
		expect(storage.getStatus().detailRows).toBe(0);
		expect(storage.getUsageSummary({ projectId: "project-a" })).toMatchObject({
			attempts: 1_200,
			inputTokens: 120_000,
			cacheReadTokens: 1_080_000,
		});
		storage.close();
	});

'''
          insert_before(
              "src/storage/storage.test.ts",
              '\tit("recreates an empty database after clear-all", () => {',
              storage_tests,
          )

          # These timings begin at Pi's message_start event. They are stream-wall
          # measurements, not end-to-end request TTFT or pure model generation time.
          replace_once(
              "src/telemetry/tps.ts",
              '`  Last: ${formatTps(last.tps)} tok/s (${formatDurationMs(last.durationMs)}, ${last.outputTokens.toLocaleString("en-US")} out)`,',
              '`  Last stream: ${formatTps(last.tps)} output tok/s (${formatDurationMs(last.durationMs)} stream wall, ${last.outputTokens.toLocaleString("en-US")} output)`,',
          )
          replace_once(
              "src/telemetry/tps.ts",
              'lines.push(`  TTFT: ${formatDurationMs(last.ttftMs)}`);',
              'lines.push(`  First content delta after stream start: ${formatDurationMs(last.ttftMs)}`);',
          )
          replace_once(
              "src/telemetry/tps.ts",
              '`  Session avg: ${formatTps(rolling.avgTps)} tok/s (${rolling.requests} ${rolling.requests === 1 ? "request" : "requests"})`,',
              '`  Session stream avg: ${formatTps(rolling.avgTps)} output tok/s (${rolling.requests} ${rolling.requests === 1 ? "assistant stream" : "assistant streams"})`,',
          )
          replace_once(
              "src/telemetry/tps.ts",
              '`  Generation: ${formatTps(last.generationTps)} tok/s (${formatDurationMs(last.generationMs)})`,',
              '`  Assistant streams: ${formatTps(last.generationTps)} output tok/s (${formatDurationMs(last.generationMs)} stream wall)`,',
          )
          replace_once(
              "src/telemetry/tps.test.ts",
              'import { computeTps, formatTpsStatusLine, TpsTracker } from "./tps.ts";',
              'import {\n\tcomputeTps,\n\tformatTpsStatusLine,\n\tformatTpsTelemetryLines,\n\tformatTurnThroughputLines,\n\tTpsTracker,\n} from "./tps.ts";',
          )
          telemetry_test = r'''
	describe("operator labels", () => {
		it("describes message timings as stream-wall metrics", () => {
			const tracker = new TpsTracker();
			tracker.beginTurn(0);
			tracker.beginAssistantMessage(100);
			tracker.markFirstToken(250);
			tracker.completeAssistantMessage({ output: 100, reasoning: 0 }, 1_100);
			tracker.completeTurn({ toolMs: 0, toolCalls: 0, endedAt: 1_200 });

			const throughput = tracker.get();
			expect(formatTpsTelemetryLines(throughput).join("\n")).toContain(
				"First content delta after stream start",
			);
			expect(formatTpsTelemetryLines(throughput).join("\n")).not.toContain(
				"TTFT",
			);
			expect(formatTurnThroughputLines(throughput.turn).join("\n")).toContain(
				"Assistant streams",
			);
		});
	});

'''
          insert_before(
              "src/telemetry/tps.test.ts",
              'describe("TpsTracker turn throughput", () => {',
              telemetry_test,
          )

          # Benchmark reports must use persisted attempts since run start, not a
          # cache segment that may have begun before the benchmark.
          replace_once(
              "src/benchmark/report.ts",
              """	const rolling = input.cache?.rolling;
	const cacheHitRatio =
		rolling && rolling.input + rolling.cacheRead + rolling.cacheWrite > 0
			? rolling.cacheRead /
				(rolling.input + rolling.cacheRead + rolling.cacheWrite)
			: input.usage.cacheHitRatio;
""",
              """	const cacheHitRatio = input.usage.cacheHitRatio;
""",
          )
          replace_once(
              "src/benchmark/report.ts",
              """		cache: {
			requestsInSegment: rolling?.requests ?? 0,
			cacheHitRatio,
			segmentChanges: input.cache?.lastPrefixChangeReason ? 1 : 0,
		},""",
              """		cache: {
			requestsInSegment: input.usage.attempts,
			cacheHitRatio,
			segmentChanges: 0,
		},""",
          )
          replace_once(
              "src/benchmark/report.ts",
              'label: `Completed runs for ${variant}`,',
              'label: `Completed runs for ${variant}/${scenario}`,',
          )
          replace_once(
              "src/benchmark/report.ts",
              """	const byVariant = new Map<BenchmarkVariantId, number>();
	for (const run of completed) {
		byVariant.set(run.variant, (byVariant.get(run.variant) ?? 0) + 1);
	}

	const lines = [
		"pi-zai benchmark gate summary",
		"",
		"Completed runs by variant:",
		...Array.from(byVariant.entries()).map(
			([variant, count]) => `  ${variant}: ${count}`,
		),""",
              """	const byVariantScenario = new Map<string, number>();
	for (const run of completed) {
		const key = `${run.variant}/${run.scenario}`;
		byVariantScenario.set(key, (byVariantScenario.get(key) ?? 0) + 1);
	}

	const lines = [
		"pi-zai benchmark gate summary",
		"",
		"Completed runs by variant/scenario:",
		...Array.from(byVariantScenario.entries()).map(
			([key, count]) => `  ${key}: ${count}`,
		),""",
          )
          replace_once(
              "src/benchmark/report.ts",
              """	const affinityRuns = completed.filter((run) => run.variant === "A3");
	const baselineRuns = completed.filter((run) => run.variant === "A1");
	if (affinityRuns.length > 0 && baselineRuns.length > 0) {
		const median = (values: number[]): number => {
			const sorted = [...values].sort((left, right) => left - right);
			return sorted[Math.floor(sorted.length / 2)] ?? 0;
		};
		const a3Median = median(
			affinityRuns.map((run) => run.report!.cache.cacheHitRatio),
		);
		const a1Median = median(
			baselineRuns.map((run) => run.report!.cache.cacheHitRatio),
		);
		const gapPp = Math.round((a3Median - a1Median) * 100);
		lines.push(
			"",
			`A3 vs A1 median cache-hit gap: ${gapPp}pp (need ${Math.round(BENCHMARK_SAMPLE_GATES.medianGapForAffinity * 100)}pp)`,
		);
	}
""",
              """	const median = (values: number[]): number => {
		const sorted = [...values].sort((left, right) => left - right);
		if (sorted.length === 0) return 0;
		const middle = Math.floor(sorted.length / 2);
		if (sorted.length % 2 === 1) return sorted[middle] ?? 0;
		return ((sorted[middle - 1] ?? 0) + (sorted[middle] ?? 0)) / 2;
	};
	const scenarios = new Set(completed.map((run) => run.scenario));
	for (const scenario of scenarios) {
		const affinityRuns = completed.filter(
			(run) => run.variant === "A3" && run.scenario === scenario,
		);
		const baselineRuns = completed.filter(
			(run) => run.variant === "A1" && run.scenario === scenario,
		);
		if (affinityRuns.length === 0 || baselineRuns.length === 0) continue;
		const a3Median = median(
			affinityRuns.map((run) => run.report!.cache.cacheHitRatio),
		);
		const a1Median = median(
			baselineRuns.map((run) => run.report!.cache.cacheHitRatio),
		);
		const gapPp = Math.round((a3Median - a1Median) * 100);
		lines.push(
			"",
			`A3 vs A1 median cache-hit gap (${scenario}): ${gapPp}pp (need ${Math.round(BENCHMARK_SAMPLE_GATES.medianGapForAffinity * 100)}pp)`,
		);
	}
""",
          )

          replace_once(
              "src/commands/benchmark.ts",
              """import {
	getCacheMetricsStore,
	getMetricsStorage,
	sessionState,
} from "../state.ts";""",
              'import { getMetricsStorage, sessionState } from "../state.ts";',
          )
          replace_once(
              "src/commands/benchmark.ts",
              """function completedRunsForVariant(variant: BenchmarkVariantId): number {
	const storage = getMetricsStorage();
	if (!storage) return 0;
	return storage
		.listBenchmarkRuns()
		.filter((run) => run.variant === variant && run.report !== undefined)
		.length;
}""",
              """function completedRunsForVariantScenario(
	variant: BenchmarkVariantId,
	scenario: BenchmarkRunManifest["scenario"],
): number {
	const storage = getMetricsStorage();
	if (!storage) return 0;
	return storage
		.listBenchmarkRuns()
		.filter(
			(run) =>
				run.variant === variant &&
				run.scenario === scenario &&
				run.report !== undefined,
		)
		.length;
}""",
          )
          replace_once(
              "src/commands/benchmark.ts",
              """					const projectId = run.manifest.projectId;
					const filter = { projectId, since: run.manifest.createdAt };
					const completedAt = Date.now();
					const projectSummary = storage.getUsageSummary({ projectId });
					const report = buildBenchmarkRunReport({
						manifest: run.manifest,
						completedAt,
						usage: storage.getUsageSummary(filter),
						transport: storage.getTransportSummary(filter),
						cache: getCacheMetricsStore().get(),
						completedRunsForVariant: completedRunsForVariant(run.variant) + 1,
						turnsObserved:
							projectSummary.attempts - run.manifest.attemptsBaseline,
					});""",
              """					if (
						run.manifest.sessionHash &&
						sessionState.sessionHash !== run.manifest.sessionHash
					) {
						ctx.ui.notify(
							"Complete the benchmark in the same Pi session in which it was started.",
							"warning",
						);
						return;
					}
					if (
						(run.manifest.provider &&
							run.manifest.provider !== sessionState.provider) ||
						(run.manifest.modelId && run.manifest.modelId !== sessionState.modelId)
					) {
						ctx.ui.notify(
							"The active provider/model changed after benchmark start. Restore it before completing the run.",
							"warning",
						);
						return;
					}
					const projectId = run.manifest.projectId;
					const filter = { projectId, since: run.manifest.createdAt };
					const completedAt = Date.now();
					const usage = storage.getUsageSummary(filter);
					const report = buildBenchmarkRunReport({
						manifest: run.manifest,
						completedAt,
						usage,
						transport: storage.getTransportSummary(filter),
						cache: undefined,
						completedRunsForVariant:
							completedRunsForVariantScenario(run.variant, run.scenario) + 1,
						turnsObserved: usage.attempts,
					});""",
          )

          benchmark_tests = r'''

	it("uses persisted run-window usage instead of a pre-existing cache segment", () => {
		const report = buildBenchmarkRunReport({
			manifest,
			completedAt: 5_000,
			usage: { ...EMPTY_USAGE_SUMMARY, attempts: 2, cacheHitRatio: 0.25 },
			transport: EMPTY_TRANSPORT_SUMMARY,
			cache: {
				segment: {
					provider: "zai",
					endpoint: "coding",
					model: "glm-5.2",
					systemFingerprint: "system",
					toolsetFingerprint: "tools",
				},
				last: undefined,
				rolling: {
					input: 0,
					cacheRead: 1_000,
					cacheWrite: 0,
					output: 0,
					requests: 99,
					hitRatio: 1,
					estimatedCost: 0,
					estimatedSavings: 0,
				},
				segmentStartedAt: 0,
			},
			completedRunsForVariant: 1,
			turnsObserved: 2,
		});
		expect(report.cache).toMatchObject({
			requestsInSegment: 2,
			cacheHitRatio: 0.25,
			segmentChanges: 0,
		});
	});
'''
          insert_before(
              "src/benchmark/report.test.ts",
              '\n});\n\ndescribe("evaluateRunGates", () => {',
              benchmark_tests,
          )
          replace_once(
              "src/benchmark/report.test.ts",
              'expect(text).toContain("Completed runs by variant");\n\t\texpect(text).toContain("A1: 1");',
              'expect(text).toContain("Completed runs by variant/scenario");\n\t\texpect(text).toContain("A1/stable-conversation: 1");',
          )

          # Package and release automation.
          replace_once("package.json", '"version": "0.3.0"', '"version": "0.4.0"')
          replace_once(
              "package.json",
              '"test": "vitest --run",',
              '"test": "vitest --run",\n\t\t"check:package": "npm pack --dry-run --json",',
          )
          lock = Path("package-lock.json")
          lock_text = lock.read_text()
          if lock_text.count('"version": "0.3.0"') < 2:
              raise SystemExit("package-lock.json: expected at least two 0.3.0 version entries")
          lock.write_text(lock_text.replace('"version": "0.3.0"', '"version": "0.4.0"', 2))
          replace_once(
              ".github/workflows/ci.yml",
              "      - run: npm test\n      - run: npm run check --prefix worker/telemetry",
              "      - run: npm test\n      - run: npm run check:package\n      - run: npm run check --prefix worker/telemetry",
          )

          changelog = Path("CHANGELOG.md")
          text = changelog.read_text()
          start = text.index("## [Unreleased]")
          end = text.index("## [0.3.0]")
          release_notes = '''## [Unreleased]\n\n### Breaking Changes\n\n### Added\n\n### Changed\n\n### Fixed\n\n### Removed\n\n## [0.4.0] - 2026-07-14\n\n### Added\n\n- Reproducible npm release workflow with package validation, provenance, tag, and GitHub Release creation.\n- `npm run check:package` validates the published file set before release.\n\n### Changed\n\n- The default `preserveThinking` policy now leaves Pi's native Z.AI request unchanged. Current Pi releases send `clear_thinking=false` while thinking is enabled; users can still force `true` or `false` explicitly in settings.\n- GLM-5.2 thinking levels now mirror Pi's current native catalog: `low`, `medium`, and `high` map to Z.AI `high`; `max` maps to Z.AI `max`; `minimal` is hidden.\n- `/zai` now scopes session totals to Z.AI providers and labels uncached, cached, and cache-write tokens explicitly.\n- `/zai-cache` now describes the current cache segment rather than calling it the full session.\n- Throughput diagnostics now identify assistant stream-wall measurements accurately instead of labelling them as request TTFT or pure generation time.\n- Benchmark gates and A3/A1 comparisons are grouped by variant and scenario. Even-sized samples use the mathematical median.\n- Benchmark reports use persisted attempts recorded after run start rather than an older in-memory cache segment.\n\n### Fixed\n\n- `Session miss ratio` incorrectly used the latest request's miss ratio instead of the rolling segment ratio.\n- All-zero usage objects from connection failures could overwrite the last successful cache sample and inflate request counts.\n- Cache writes were omitted from the non-hit ratio.\n- SQLite cleanup could overwrite existing daily rollups or repeatedly count rows across size-limit batches.\n- Benchmark completion could count runs from a different scenario toward the current scenario's gate.\n- `/zai-doctor`, the README, configuration docs, thinking docs, and cache docs described an obsolete `xhigh` mapping and the wrong `clear_thinking` default.\n- The cache-affinity benchmark documentation incorrectly called fixed `X-Session-Id` the default even though `sessionAffinity` defaults to `off`.\n\n'''
          changelog.write_text(text[:start] + release_notes + text[end:])

          replace_once(
              "docs/commands.md",
              "- throughput (tok/s)",
              "- assistant stream-wall throughput (output tok/s), first content delta after stream start, and turn-effective throughput",
          )
          replace_once(
              "docs/commands.md",
              "A0–A3 cache benchmark harness and local run tracking.",
              "A0–A3 cache benchmark harness and local run tracking. Reports use persisted attempts after run start; completion must happen in the same Pi session and provider/model.",
          )

          Path(".github/workflows/release.yml").write_text('''name: Release\n\non:\n  push:\n    branches: [main]\n    paths:\n      - package.json\n      - package-lock.json\n      - CHANGELOG.md\n      - .github/workflows/release.yml\n\nconcurrency:\n  group: npm-release\n  cancel-in-progress: false\n\npermissions:\n  contents: write\n  id-token: write\n\njobs:\n  publish:\n    if: github.repository == 'OnlineChefGroep/pi-zai'\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7\n        with:\n          persist-credentials: false\n      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6\n        with:\n          node-version: '22.x'\n          registry-url: https://registry.npmjs.org\n          package-manager-cache: false\n      - name: Use npm with trusted-publishing support\n        run: npm install --global npm@11.5.1\n      - name: Read package identity\n        id: package\n        run: |\n          echo "name=$(node -p \"require('./package.json').name\")" >> "$GITHUB_OUTPUT"\n          echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"\n      - name: Check registry\n        id: registry\n        env:\n          PACKAGE_NAME: ${{ steps.package.outputs.name }}\n          PACKAGE_VERSION: ${{ steps.package.outputs.version }}\n        run: |\n          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version --json >/dev/null 2>&1; then\n            echo "published=true" >> "$GITHUB_OUTPUT"\n          else\n            echo "published=false" >> "$GITHUB_OUTPUT"\n          fi\n      - if: steps.registry.outputs.published != 'true'\n        run: npm ci --ignore-scripts\n      - if: steps.registry.outputs.published != 'true'\n        run: npm ci --ignore-scripts --prefix worker/telemetry\n      - if: steps.registry.outputs.published != 'true'\n        run: npm run lint\n      - if: steps.registry.outputs.published != 'true'\n        run: npm run build\n      - if: steps.registry.outputs.published != 'true'\n        run: npm test\n      - if: steps.registry.outputs.published != 'true'\n        run: npm run check:package\n      - if: steps.registry.outputs.published != 'true'\n        run: npm run check --prefix worker/telemetry\n      - name: Publish package\n        if: steps.registry.outputs.published != 'true'\n        env:\n          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}\n        run: npm publish --access public --provenance\n      - name: Create GitHub release and tag\n        env:\n          GH_TOKEN: ${{ github.token }}\n          PACKAGE_VERSION: ${{ steps.package.outputs.version }}\n        run: |\n          tag="v$PACKAGE_VERSION"\n          if ! gh release view "$tag" >/dev/null 2>&1; then\n            gh release create "$tag" --target "$GITHUB_SHA" --title "$tag" --generate-notes\n          fi\n''')

          Path(".github/workflows/apply-v040-hardening.yml").unlink()
          PY
      - run: npm ci --ignore-scripts
      - run: npm ci --ignore-scripts --prefix worker/telemetry
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - run: npm run check:package
      - run: npm run check --prefix worker/telemetry
      - name: Commit validated hardening
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "release: prepare v0.4.0"
          git push origin HEAD:release/v0.4.0-metrics-hardening
