name: Format final PR 23 fixes

on:
  push:
    branches:
      - cursor/bc-1b469a3b-e3f5-4805-ab23-86e74757f875-bd6a
    paths:
      - .github/workflows/pr23-format-fix.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - run: npm ci --ignore-scripts
      - run: npm run lint:fix
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - name: Remove temporary workflow and commit
        run: |
          rm .github/workflows/pr23-format-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "style: format final adaptive lifecycle fixes"
          git push origin HEAD:${GITHUB_REF_NAME}
