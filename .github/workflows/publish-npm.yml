# Publishes @onlinechefgroep/pi-zai to npmjs.org and mirrors to GitHub Packages.
#
# This is the *manual tag-push fallback* path. The primary publisher is
# release.yml, which auto-publishes on pushes to main that change the package
# version and then creates the version tag via the default GITHUB_TOKEN. A tag
# created with GITHUB_TOKEN does not emit a new push event, so this workflow is
# not normally re-triggered by release.yml. It exists for explicit, manual
# `git push origin v<x>` releases. Idempotent per registry: skips cleanly if the
# version is already on that registry. npmjs requires the NPM_TOKEN org secret;
# GitHub Packages uses GITHUB_TOKEN with packages:write.
name: Publish to npmjs.org (Public)

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            worker/telemetry/package-lock.json
      - name: Read package version
        id: package
        run: |
          v=$(node -p "require('./package.json').version")
          printf 'version=%s\n' "$v" >> "$GITHUB_OUTPUT"
      - name: Check npmjs.org
        id: npmjs
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          if npm view "@onlinechefgroep/pi-zai@$PACKAGE_VERSION" version --json >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Check GitHub Packages
        id: ghpkg
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          userconfig="$(mktemp)"
          trap 'rm -f "$userconfig"' EXIT
          {
            printf '%s\n' '@onlinechefgroep:registry=https://npm.pkg.github.com'
            printf '%s\n' "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          } >"$userconfig"

          set +e
          out="$(npm view "@onlinechefgroep/pi-zai@$PACKAGE_VERSION" version --userconfig "$userconfig" --json 2>&1)"
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          elif printf '%s\n' "$out" | grep -Eqi 'E404|404 Not Found|code E404'; then
            echo "published=false" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$out" >&2
            exit 1
          fi
      - name: Decide whether to build
        id: gate
        run: |
          if [ "${{ steps.npmjs.outputs.published }}" != "true" ] || [ "${{ steps.ghpkg.outputs.published }}" != "true" ]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.gate.outputs.needed == 'true'
        run: npm ci --ignore-scripts
      - if: steps.gate.outputs.needed == 'true'
        run: npm ci --ignore-scripts --prefix worker/telemetry
      - if: steps.gate.outputs.needed == 'true'
        run: npm run lint
      - if: steps.gate.outputs.needed == 'true'
        run: npm run build
      - if: steps.gate.outputs.needed == 'true'
        run: npm test
      - if: steps.gate.outputs.needed == 'true'
        run: npm run check:consumer-install
      - if: steps.gate.outputs.needed == 'true'
        run: node scripts/worker-audit.mjs
      - name: Publish to npmjs.org
        if: steps.npmjs.outputs.published != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
      - name: Publish to GitHub Packages
        if: steps.ghpkg.outputs.published != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          userconfig="$(mktemp)"
          trap 'rm -f "$userconfig"' EXIT
          {
            printf '%s\n' '@onlinechefgroep:registry=https://npm.pkg.github.com'
            printf '%s\n' "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          } >"$userconfig"

          if [ ! -f dist/index.js ]; then
            npm run build
          fi

          npm publish --access public --ignore-scripts --userconfig "$userconfig"
