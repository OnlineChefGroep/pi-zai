name = "pi-zai-telemetry"
main = "src/index.ts"
compatibility_date = "2025-07-01"

routes = [
  { pattern = "api.chefgroep.online/pi-zai/telemetry/v1/aggregate", zone_name = "chefgroep.online" }
]

[[analytics_engine_datasets]]
binding = "PI_ZAI_TELEMETRY"
dataset = "pi_zai_telemetry"

[[ratelimits]]
name = "PI_ZAI_RATE_LIMITER"
namespace_id = "1001"

  [ratelimits.simple]
  limit = 30
  period = 60

[observability]
enabled = true
