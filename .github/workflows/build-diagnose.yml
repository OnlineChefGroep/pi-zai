name: Build Diagnose

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22.x'
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Apply diagnosed compiler fix
        shell: bash
        run: |
          sed -i 's/readPiRetrySettings(ctx\.cwd)/readPiRetrySettings()/' src/commands/doctor.ts
          npm run lint:fix
          rm -f BUILD-DIAGNOSTIC.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/commands/doctor.ts BUILD-DIAGNOSTIC.txt
          git commit -m "fix(doctor): call retry settings reader with supported signature" || exit 0
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
