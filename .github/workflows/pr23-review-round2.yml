name: Apply PR 23 review fixes

on:
  push:
    branches:
      - cursor/bc-1b469a3b-e3f5-4805-ab23-86e74757f875-bd6a
    paths:
      - scripts/apply-pr23-review-round2.py
      - .github/workflows/pr23-review-round2.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - run: python3 scripts/apply-pr23-review-round2.py
      - run: npm ci --ignore-scripts
      - run: npm run lint:fix
      - run: npm run lint
      - run: npm run check:version
      - run: npm run build
      - run: npm test
      - run: npm run check:consumer-install
      - name: Commit validated review fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix: address security and reliability review findings"
          git push origin HEAD:${GITHUB_REF_NAME}
