name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          persist-credentials: true
      # BEGIN TEMPORARY V040 APPLY STEP
      - name: Apply validated v0.4.0 hardening
        if: github.event_name == 'pull_request' && github.head_ref == 'release/v0.4.0-metrics-hardening'
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import textwrap

          source = Path('.github/workflows/apply-v040-hardening.yml').read_text()
          embedded = source.split("          python3 <<'PY'\n", 1)[1].split("\n          PY", 1)[0]
          exec(textwrap.dedent(embedded), {'__name__': '__main__'})

          ci = Path('.github/workflows/ci.yml')
          text = ci.read_text()
          start = text.index('      # BEGIN TEMPORARY V040 APPLY STEP\n')
          end = text.index('      # END TEMPORARY V040 APPLY STEP\n') + len('      # END TEMPORARY V040 APPLY STEP\n')
          text = text[:start] + text[end:]
          text = text.replace('permissions:\n  contents: write', 'permissions:\n  contents: read')
          text = text.replace('        with:\n          ref: ${{ github.event.pull_request.head.ref || github.ref }}\n          persist-credentials: true\n', '        with:\n          persist-credentials: false\n')
          ci.write_text(text)
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "release: prepare v0.4.0"
          git push origin HEAD:${GITHUB_HEAD_REF}
      # END TEMPORARY V040 APPLY STEP
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            worker/telemetry/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm ci --ignore-scripts --prefix worker/telemetry
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - run: npm run check --prefix worker/telemetry
