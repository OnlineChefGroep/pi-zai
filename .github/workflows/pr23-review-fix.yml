name: PR 23 review fix

on:
  push:
    branches:
      - cursor/bc-1b469a3b-e3f5-4805-ab23-86e74757f875-bd6a
    paths:
      - scripts/apply-pr23-review-fixes.py
      - .github/workflows/pr23-review-fix.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - name: Apply review fixes
        run: python3 scripts/apply-pr23-review-fixes.py
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Format and lint
        run: npm run lint:fix
      - name: Validate version
        run: npm run check:version
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
      - name: Validate consumer install
        run: npm run check:consumer-install
      - name: Commit validated fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix: harden adaptive tools and capability probes"
          git push origin HEAD:${GITHUB_REF_NAME}
